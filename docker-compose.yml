  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - cost-network

volumes:
  redis-data:
  # postgres-data:

networks:
  cost-network:
    driver: bridge
